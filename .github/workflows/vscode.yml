name: VSCode

on:
  push:
    branches:
      - master
    tags:
      - "**"
  pull_request:

jobs:
  pre_job:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
      paths_result: ${{ steps.skip_check.outputs.paths_result }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@9d116fa7e55f295019cfab7e3ab72b478bcf7fdd # v4
        with:
          paths: '["squawk-vscode/**"]'

  typecheck:
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2
        with:
          version: 9
      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version-file: "squawk-vscode/package.json"
          cache-dependency-path: "squawk-vscode/pnpm-lock.yaml"
          cache: "pnpm"
      - name: Install JS dependencies
        working-directory: "squawk-vscode"
        run: pnpm install

      - name: Run type check
        working-directory: "squawk-vscode"
        run: pnpm run check-types

  lint:
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2
        with:
          version: 9
      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version-file: "squawk-vscode/package.json"
          cache-dependency-path: "squawk-vscode/pnpm-lock.yaml"
          cache: "pnpm"
      - name: Install JS dependencies
        working-directory: "squawk-vscode"
        run: pnpm install

      - name: Run lints
        working-directory: "squawk-vscode"
        run: pnpm run lint

  test:
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2
        with:
          version: 9
      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version-file: "squawk-vscode/package.json"
          cache-dependency-path: "squawk-vscode/pnpm-lock.yaml"
          cache: "pnpm"
      - name: Install JS dependencies
        working-directory: "squawk-vscode"
        run: pnpm install

      - name: Run tests
        working-directory: "squawk-vscode"
        run: xvfb-run pnpm run test
